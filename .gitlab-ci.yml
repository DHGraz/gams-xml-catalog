stages:
  - test
  - lint
  - tag
  - publish

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"

cache:
  key:
    files:
      - uv.lock
  paths:
    - .uv-cache

# Common initialization for all jobs
default:
  #image: ghcr.io/astral-sh/uv:debian-slim
  before_script:
    - uv python install $PYTHON_VERSION

# Linting (Ruff normally only needs one python version)
lint-ruff:
  stage: lint
  variables:
    PYTHON_VERSION: "3.12"
  script:
    - uv run ruff check src

# Testing with matrix for 3.11 to 3.13
pytest:
  stage: test
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13"]
  script:
    - uv run --python $PYTHON_VERSION pytest



# Nightly matrix: force fresh environments and dependency upgrades
nightly-pytest:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - when: never
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13"]
  script:
    - echo "uv environment version"
    - uv --version
    - echo "Forcing fresh install and upgraded dependencies"
    - rm -rf .venv
    - uv cache clean
    - uv sync --python $PYTHON_VERSION --upgrade
    - echo "Using python version:"
    - uv run --python $PYTHON_VERSION python --version
    - echo "Running tests with uv"
    - uv run --python $PYTHON_VERSION pytest tests



.rules:
  - if: $CI_COMMIT_REF_NAME == "main" || $CI_COMMIT_REF_NAME == "develop"
    when: always

# Reads the version from pyproject.toml and creates a git tag if it does not
# already exist. Runs only on pushes to main (not on scheduled pipelines).
auto-tag:
  stage: tag
  image:
    name: alpine/git:latest
    entrypoint: [""]
  before_script: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE != "schedule"
      when: always
    - when: never
  script:
    - VERSION=$(awk -F ' = ' '/^\[project\]/{in_project=1; next} /^\[/{in_project=0} in_project && /^version = / {gsub(/"/, "", $2); print $2; exit}' pyproject.toml)
    - TAG="v${VERSION}"
    - echo "Detected version ${TAG}"
    - git fetch --tags --prune origin
    - |
      # Remove any stale local tag so deleted remote tags can be recreated safely.
      git tag -d "${TAG}" 2>/dev/null || true

      if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null; then
        echo "Tag ${TAG} already exists remotely, nothing to do"
      else
        echo "Creating tag ${TAG}"
        git config user.email "ci@gitlab"
        git config user.name "GitLab CI"
        git tag "${TAG}"

        echo "GIT_PUSH_TOKEN available: ${GIT_PUSH_TOKEN:+yes}"
        if [ -z "${GIT_PUSH_TOKEN}" ]; then
          echo "GIT_PUSH_TOKEN is missing in this job environment"
          echo "Check CI/CD variable protection/scope and start a new pipeline (not retry)."
          exit 1
        fi
        PUSH_URL="https://oauth2:${GIT_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"

        echo "Attempting to push to ${CI_SERVER_HOST}/${CI_PROJECT_PATH} as oauth2 user"
        if git push "${PUSH_URL}" "refs/tags/${TAG}"; then
          echo "Tag ${TAG} pushed successfully"
        else
          echo "Initial tag push failed, re-checking remote tag state"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} is now present remotely (likely created by another pipeline), continuing"
          else
            echo "Tag push failed: configure GIT_PUSH_TOKEN (Project Access Token with write_repository)"
            exit 1
          fi
        fi
      fi

# Builds the package and publishes it to PyPI whenever a vX.Y.Z tag is pushed.
# Requires a PYPI_TOKEN CI/CD variable set in the project's GitLab settings.
publish-to-pypi:
  stage: publish
  variables:
    PYTHON_VERSION: "3.12"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
      when: always
    - when: never
  script:
    - rm -rf .uv-cache .venv
    - VERSION="${CI_COMMIT_TAG#v}"
    - PACKAGE_NAME=$(awk -F ' = ' '/^\[project\]/{in_project=1; next} /^\[/{in_project=0} in_project && /^name = / {gsub(/"/, "", $2); print $2; exit}' pyproject.toml)
    - echo "Checking if ${PACKAGE_NAME} ${VERSION} already exists on PyPI"
    - |
      if uv run --python $PYTHON_VERSION python - "$PACKAGE_NAME" "$VERSION" <<'PY'
      import json
      import sys
      import urllib.error
      import urllib.request

      package_name, version = sys.argv[1], sys.argv[2]
      url = f"https://pypi.org/pypi/{package_name}/json"

      try:
          with urllib.request.urlopen(url, timeout=20) as response:
              data = json.load(response)
      except urllib.error.HTTPError as exc:
          if exc.code == 404:
              sys.exit(1)
          raise

      sys.exit(0 if version in data.get("releases", {}) else 1)
      PY
      then
        echo "Version ${VERSION} already published on PyPI, skipping publish"
        exit 0
      fi
    - echo "Building package"
    - uv build
    - echo "Publishing version ${CI_COMMIT_TAG} to PyPI"
    - uv publish --token "${PYPI_TOKEN}"